name: Create GitHub release
on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version'
        required: true
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Print release version
        run: |
          echo "Release version ${{ github.event.inputs.release_version }}!"
      - name: Checkout project
        uses: actions/checkout@v5
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.inputs.release_version }}
          name: Release ${{ github.event.inputs.release_version }}
          generateReleaseNotes: true
          body: |
            Grab the new version from Maven central https://repo1.maven.org/maven2/io/github/kgromov/json-placeholder-starter/${{ inputs.release_version }}
            
            ```
            <dependencies>
            	<dependency>
            	    <groupId>io.github.kgromov</groupId>
            	    <artifactId>json-placeholder-starter</artifactId>
            	    <version>${{ inputs.release_version }}</version>
            	</dependency>
            </dependencies>
            ```
          token: ${{ secrets.GITHUB_TOKEN }}
