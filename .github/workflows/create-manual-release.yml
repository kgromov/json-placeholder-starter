name: Create GitHub release
on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version'
        required: true
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout project
        uses: actions/checkout@v5

#      - name: Generate changelog
#        id: changelog
#        uses: metcalfc/changelog-generator@v4
#        with:
#          myToken: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Release with auto-generated notes
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          name: Release ${{ github.event.inputs.release_version }}
          tag: ${{ github.event.inputs.release_version }}
          allowUpdates: true
          generateReleaseNotes: true
          body: |
            Grab the new version from Maven central https://repo1.maven.org/maven2/io/github/kgromov/json-placeholder-starter/${{ inputs.release_version }}
            
            ```
            <dependencies>
            	<dependency>
            	    <groupId>io.github.kgromov</groupId>
            	    <artifactId>json-placeholder-starter</artifactId>
            	    <version>${{ inputs.release_version }}</version>
            	</dependency>
            </dependencies>
            ```
            
            ### Changes:
            ${{ steps.changelog.outputs.changelog }}
          token: ${{ secrets.GITHUB_TOKEN }}
