name: Release with publishing to the Maven Central
on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version increment type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v5

      - name: Set up release version
        id: next_version
        uses: ./.github/actions/get-next-version
        with:
          version_type: ${{ github.event.inputs.version_type || 'patch' }}

      - name: Setup release version as Maven project version
        run: mvn versions:set "-DnewVersion=${{ steps.next_version.outputs.version }}" versions:commit

      - name: Set up Maven Config
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: oracle
          cache: 'maven'
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - name: Publish to Maven Central
        run: mvn --batch-mode clean deploy -P release -DskipTests=true
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

  create_release:
    needs:
      - publish
    uses: ./.github/workflows/create-release.yml
    with:
      release_version: ${{ github.event.inputs.release_version }}

  update-next-development:
    needs:
      - create_release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v5

      - name: Increment Snapshot Version
        run: | 
          mvn versions:set versions:commit -DnextSnapshot 

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      # May use stefanzweifel/git-auto-commit-action instead with pr against master
      - name: Commit release version
        run: |
          git add pom.xml
          git commit -m "(${{ github.actor }}): Increment next development version"
          git push origin master
