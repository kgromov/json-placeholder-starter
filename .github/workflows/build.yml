name: Create GitHub release
on:
  push:
    branches:
      - master
      - release/*
      - feature/*
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v5

      - name: Set up Maven Config
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build project
        run: |
          mvn clean verify
