name: Release with publishing to the Maven Central
on:
  push:
    branches:
      - feature/*
permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.next_version.outputs.version }}
    steps:
      - name: Checkout project
        uses: actions/checkout@v5

      - name: Set up release version
        id: next_version
        uses: ./.github/actions/get-next-version
        with:
          version_type: ${{ github.event.inputs.version_type || 'patch' }}

  create_release:
    runs-on: ubuntu-latest
    needs:
      - publish
    steps:
      - name: Print next version saved in publish job
        run: |
          echo "Release version = ${{ needs.publish.outputs.release_version }}"

      - name: Checkout project
        uses: actions/checkout@v5

      - name: Get next Snapshot Version
        id: next_development
        uses: ./.github/actions/get-next-version
        with:
          base_version: ${{ needs.publish.outputs.release_version }}
          version_type: 'patch'

      - name: Increment Snapshot version
        run: |
          VERSION="${{ steps.next_development.outputs.version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEXT_DEV="$MAJOR.$MINOR.$PATCH-SNAPSHOT"
          echo "Next dev version = $NEXT_DEV"
          

